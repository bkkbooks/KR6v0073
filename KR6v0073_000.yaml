front:
  text: 金剛禮通理大師集整理者達照題解金剛禮中國僧人所撰懺儀典籍作者通理一卷通理遼代著名高僧法名恆策字開玄俗姓王通理為其賜號西京道奉聖州樊山縣新安鎮今河北省涿鹿縣礬山堡鎮人他生於遼興宗重熙十七年七歲出家活動于遼道宗咸雍大康大安年間卒于遼道宗壽昌四年通理深受朝野敬仰道宗對他非常器重特賜紫袍皇室百官等餘人禮他為師門徒甚衆德被遐邇一生以講經傳戒刻經為業尤以續刻房山雲居寺遼代石經最為傑出金剛禮為通理在續刻石經時所刻他于大安九年正月籌集刻經經費主持刻經事宜至壽昌元年就停止刻經所以金剛禮最晚撰寫於他停刻石經即年之前由於歷代藏經均無收録因此它的流傳情況現在還不得而知但就其內容來看屬於由念經功德生發擴展而成的佛教懺儀類文獻如文中説罪障皆消滅速圓般若海末後又説禮懺歸依竟所集諸聖因施一切群生皆共成佛道而通理在石經停刻之後就到房山西北山區的蓮花峪結庵而居後為道宗皇帝宣請為內殿懺悔主可見他對佛教懺法的精通金剛禮是依金剛經而創造的一種禮懺儀共八個部分第一部分是標名金剛禮一本作者通理大師集題注作供梵歎如常依慈氏禮聲説明在舉行金剛禮的儀式時需要上供即以精美的飯菜果品等設立佛前舉行一定的念誦儀式念誦時的行腔接腔等梵歎與平常日用課誦的方式一樣板點節奏則依慈氏禮的禮誦方法可惜慈氏禮已經失傳無從考知金剛禮在念誦時的音調高低節拍快慢然行腔接腔與現在的佛教課誦似應無多大出入如行腔者一人即維那僧職之一在殿堂裏專務領唱舉腔唱志心歸命禮接腔者衆人接下來就唱法身非相一切佛寶然後再舉腔再接腔這種禮懺方式至今仍在漢傳佛教圈裏頗為盛行據説這種梵唄能夠反映出唐朝的梵唄特徵如田青教授説的從音樂上分析讚類音樂先由維那舉腔領唱然後衆僧和之舉腔之初有腔無板可視為唐樂遺緒參見中國宗教音樂中國漢傳佛教音樂田青宗教文化出版社年月第頁第二部分即主體部分是把金剛經的三十二分的名稱彙集在一起又把須菩提證得的無諍三昧放在末尾計三十三句每句四字共一百三十二字再分為三類分別納入一切佛寶一切法寶一切僧寶之中每類前均冠以志心歸命禮這與其他懺儀的形式是一致的只是在內容上有著自己的獨到之處第三四部分是發願懺悔也是依金剛經的內容而作的如説三十二分滿即指金剛經的三十二分二十七疑遣則指金剛經中的二十七處疑難又如先身有報障今日受持經暫被人輕賤轉重復還輕即依金剛經中若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅而來由此可見金剛禮是金剛經中消業思想的具體展示第五六七八部分與其他懺儀基本一致分別為唱處世界吟回向偈志心普命及末後的總回向金剛禮作為佛教懺儀被保存下來對中國佛教的懺法研究具有不可替代的文獻價值它用一種楞嚴彎的形式雕刻就給研究遼代版本提供了硬性的碑刻信息同時也是研究金剛經以及遼代佛教音樂的重要史料此外本文獻對研究佛教的消業思想和信仰性形態都有其獨特的參考價值陳燕珠女士曾對本文獻作過整理需要説明的是本懺儀在房山石經遼代刻經中是以楞嚴彎的形式鐫刻上去的見覆帙頁下這次為了合乎體例依據佛教慣用方法把它轉寫成文本的形式使讀者能夠一目了然録文
